<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=640,height=480,initial-scale=1.0,user-scalable=no">
<title>MeshTalk HUD</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 640px; height: 480px;
  overflow: hidden;
  background: transparent;
  font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  color: #ffffff;
  -webkit-font-smoothing: antialiased;
}

/* ── Top-left: app name ── */
#app-name {
  position: absolute;
  top: 12px; left: 16px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #00ffff;
  text-shadow:
    0 0 6px rgba(0, 255, 255, 0.9),
    0 0 14px rgba(0, 255, 255, 0.6),
    0 0 28px rgba(0, 255, 255, 0.3);
}

/* ── Top-right: channel + user count + radio state ── */
#channel-block {
  position: absolute;
  top: 12px; right: 16px;
  text-align: right;
}
#channel-name {
  font-size: 22px;
  font-weight: 600;
  color: #00ffff;
}
#user-count {
  font-size: 16px;
  color: #88ccff;
  margin-top: 2px;
}
#radio-state {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 4px;
  font-size: 12px;
  color: #888888;
  letter-spacing: 1px;
}
#radio-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #666666;
  flex-shrink: 0;
}
#radio-dot.green  { background: #30d158; box-shadow: 0 0 6px rgba(48, 209, 88, 0.6); }
#radio-dot.yellow { background: #ffd60a; box-shadow: 0 0 6px rgba(255, 214, 10, 0.6); }
#radio-dot.orange { background: #ff9f0a; box-shadow: 0 0 6px rgba(255, 159, 10, 0.6); }
#radio-dot.red    { background: #ff453a; box-shadow: 0 0 6px rgba(255, 69, 58, 0.6); }
#radio-dot.blue   { background: #64d2ff; box-shadow: 0 0 6px rgba(100, 210, 255, 0.6); }
#radio-label {
  font-size: 11px;
  font-weight: 500;
  color: inherit;
}

/* ── Center: VOX indicator ── */
#vox-block {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#vox-dot {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #666666;
  transition: background 0.2s ease;
}
#vox-dot.active {
  background: #00ee44;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(0, 238, 68, 0.7); }
  50%  { box-shadow: 0 0 16px 8px rgba(0, 238, 68, 0.35); }
  100% { box-shadow: 0 0 0 0 rgba(0, 238, 68, 0); }
}
#vox-label {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #cccccc;
}
#vox-label.active {
  color: #00ee44;
}

/* ── Below center: mute indicator ── */
#mute-indicator {
  position: absolute;
  top: 58%; left: 50%;
  transform: translateX(-50%);
  margin-top: 20px;
  font-size: 18px;
  font-weight: 700;
  color: #ff3333;
  display: none;
}

/* ── Bottom corners: swipe hints ── */
.swipe-hint {
  position: absolute;
  bottom: 14px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.15);
  font-weight: 400;
}
#hint-left  { left: 16px; }
#hint-right { right: 16px; }

/* ── Bottom center: status bar ── */
#status-bar {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #888888;
  white-space: nowrap;
}

/* ── Bottom-left: Spatial radar ── */
#radar-block {
  position: absolute;
  bottom: 36px; left: 16px;
  width: 80px; height: 80px;
  display: none;  /* shown when peer direction is known */
}
#radar-canvas {
  width: 80px;
  height: 80px;
}
#radar-label {
  position: absolute;
  bottom: -16px;
  left: 0;
  width: 80px;
  text-align: center;
  font-size: 10px;
  color: #88ccff;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="app-name">MESHTALK</div>

<div id="channel-block">
  <div id="channel-name">DEFAULT</div>
  <div id="user-count">0 on</div>
  <div id="radio-state">
    <span id="radio-label">BLE: Scanning...</span>
    <span id="radio-dot"></span>
  </div>
</div>

<div id="vox-block">
  <div id="vox-dot"></div>
  <div id="vox-label">IDLE</div>
</div>

<div id="mute-indicator">🔇 MUTED</div>

<div class="swipe-hint" id="hint-left">← CH</div>
<div class="swipe-hint" id="hint-right">MUTE →</div>

<div id="status-bar">ready</div>

<!-- Spatial radar -->
<div id="radar-block">
  <canvas id="radar-canvas" width="160" height="160"></canvas>
  <div id="radar-label">—</div>
</div>

<script>
(function() {
  'use strict';

  var elChannel   = document.getElementById('channel-name');
  var elUserCount = document.getElementById('user-count');
  var elVoxDot    = document.getElementById('vox-dot');
  var elVoxLabel  = document.getElementById('vox-label');
  var elMute      = document.getElementById('mute-indicator');
  var elStatus    = document.getElementById('status-bar');
  var elRadar     = document.getElementById('radar-block');
  var radarCanvas = document.getElementById('radar-canvas');
  var radarCtx    = radarCanvas.getContext('2d');
  var elRadarLabel = document.getElementById('radar-label');
  var elRadioDot   = document.getElementById('radio-dot');
  var elRadioLabel = document.getElementById('radio-label');

  // Radar state
  var peerAngle = 0;    // degrees, 0 = ahead
  var peerDist = 0.5;   // 0.0 = touching, 1.0 = far
  var radarVisible = false;

  function drawRadar() {
    var w = radarCanvas.width;
    var h = radarCanvas.height;
    var cx = w / 2;
    var cy = h / 2;
    var r = w / 2 - 4;

    radarCtx.clearRect(0, 0, w, h);

    // Outer ring
    radarCtx.beginPath();
    radarCtx.arc(cx, cy, r, 0, Math.PI * 2);
    radarCtx.strokeStyle = 'rgba(0, 255, 255, 0.25)';
    radarCtx.lineWidth = 1.5;
    radarCtx.stroke();

    // Middle ring
    radarCtx.beginPath();
    radarCtx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
    radarCtx.strokeStyle = 'rgba(0, 255, 255, 0.12)';
    radarCtx.lineWidth = 1;
    radarCtx.stroke();

    // Crosshair
    radarCtx.beginPath();
    radarCtx.moveTo(cx, cy - r); radarCtx.lineTo(cx, cy + r);
    radarCtx.moveTo(cx - r, cy); radarCtx.lineTo(cx + r, cy);
    radarCtx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
    radarCtx.lineWidth = 1;
    radarCtx.stroke();

    // "Forward" indicator (small triangle at top)
    radarCtx.beginPath();
    radarCtx.moveTo(cx, cy - r - 2);
    radarCtx.lineTo(cx - 4, cy - r + 5);
    radarCtx.lineTo(cx + 4, cy - r + 5);
    radarCtx.closePath();
    radarCtx.fillStyle = 'rgba(0, 255, 255, 0.5)';
    radarCtx.fill();

    // Center dot (listener)
    radarCtx.beginPath();
    radarCtx.arc(cx, cy, 3, 0, Math.PI * 2);
    radarCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    radarCtx.fill();

    // Peer dot
    // angle: 0 = ahead (top), positive = clockwise
    // distance maps to radius: 0 = center, 1 = edge
    var angleRad = (peerAngle - 90) * Math.PI / 180;  // -90 to make 0° = up
    var dotR = peerDist * r * 0.85;
    var dx = cx + Math.cos(angleRad) * dotR;
    var dy = cy + Math.sin(angleRad) * dotR;

    // Dot color: green when near, yellow mid, red far
    var dotColor;
    if (peerDist < 0.33) dotColor = '#30d158';       // near = green
    else if (peerDist < 0.66) dotColor = '#ffd60a';   // mid = yellow
    else dotColor = '#ff6b6b';                         // far = red

    // Glow
    radarCtx.beginPath();
    radarCtx.arc(dx, dy, 8, 0, Math.PI * 2);
    radarCtx.fillStyle = dotColor.replace(')', ', 0.25)').replace('rgb', 'rgba').replace('#', '');
    // Simple glow via shadow
    radarCtx.shadowColor = dotColor;
    radarCtx.shadowBlur = 8;
    radarCtx.fill();
    radarCtx.shadowBlur = 0;

    // Solid dot
    radarCtx.beginPath();
    radarCtx.arc(dx, dy, 5, 0, Math.PI * 2);
    radarCtx.fillStyle = dotColor;
    radarCtx.fill();
  }

  window.HUD = {
    updateChannel: function(name) {
      elChannel.textContent = name || 'DEFAULT';
    },

    updateUserCount: function(count) {
      var n = (typeof count === 'number') ? count : parseInt(count, 10) || 0;
      elUserCount.textContent = n + ' on';
    },

    updateVox: function(active) {
      if (active) {
        elVoxDot.classList.add('active');
        elVoxLabel.classList.add('active');
        elVoxLabel.textContent = 'LIVE';
      } else {
        elVoxDot.classList.remove('active');
        elVoxLabel.classList.remove('active');
        elVoxLabel.textContent = 'IDLE';
      }
    },

    updateMute: function(muted) {
      elMute.style.display = muted ? 'block' : 'none';
    },

    updateStatus: function(text) {
      elStatus.textContent = text || '';
    },

    /**
     * Update peer spatial radar.
     * @param {number} angle  - relative direction in degrees (0=ahead, ±180=behind)
     * @param {number} distance - normalized distance (0.0=touching, 1.0=far)
     */
    updatePeerDirection: function(angle, distance) {
      peerAngle = angle || 0;
      peerDist = Math.max(0, Math.min(1, distance || 0.5));

      if (!radarVisible) {
        radarVisible = true;
        elRadar.style.display = 'block';
      }

      drawRadar();

      // Update distance label
      var label;
      if (peerDist < 0.33) label = 'NEAR';
      else if (peerDist < 0.66) label = 'MID';
      else label = 'FAR';
      elRadarLabel.textContent = label;
    },

    /**
     * Update radio state indicator.
     * States: DISABLED, WIFI_OFF, AWARE_DISABLED, ATTACHING, ATTACHED,
     *         PUBLISHING, DISCOVERING, CONNECTED, DOZING, RECOVERING, FAILED
     */
    updateRadioState: function(state) {
      // Legacy — forward to BLE state display
      this.updateBleState(state);
    },

    /**
     * Update BLE connection state indicator.
     * States: DISCONNECTED, SCANNING, CONNECTING, DISCOVERING_SERVICES,
     *         ENABLING_NOTIFICATIONS, CONNECTED, RECONNECTING
     */
    updateBleState: function(state) {
      var s = (state || 'DISCONNECTED').toUpperCase();

      // Remove all color classes
      elRadioDot.className = '';
      elRadioDot.id = 'radio-dot';

      var label;
      var colorClass;
      switch (s) {
        case 'CONNECTED':
          label = 'BLE: Connected to Phone';
          colorClass = 'green'; break;
        case 'SCANNING':
          label = 'BLE: Scanning...';
          colorClass = 'yellow'; break;
        case 'CONNECTING':
        case 'DISCOVERING_SERVICES':
        case 'ENABLING_NOTIFICATIONS':
          label = 'BLE: Connecting...';
          colorClass = 'yellow'; break;
        case 'RECONNECTING':
          label = 'BLE: Reconnecting...';
          colorClass = 'orange'; break;
        case 'DISCONNECTED':
        default:
          label = 'BLE: Disconnected';
          colorClass = 'red'; break;
      }
      elRadioLabel.textContent = label;
      elRadioDot.classList.add(colorClass);
    }
  };

  document.addEventListener('DOMContentLoaded', function() {
    if (window.NativeBridge && typeof window.NativeBridge.onWebViewReady === 'function') {
      window.NativeBridge.onWebViewReady();
    }
  });
})();
</script>
</body>
</html>
